<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard VHAT - VDC</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 0; padding: 10px; }
        .card { background: white; max-width: 850px; margin: 10px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #01579b; text-align: center; font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
        #chart-wrap { position: relative; height: 350px; width: 100%; margin-bottom: 20px; }
        #evaluation-box { padding: 20px; border-radius: 8px; background: #fff; border: 1px solid #e0e0e0; }
        .eval-header { color: #01579b; font-weight: bold; font-size: 16px; border-bottom: 2px solid #01579b; padding-bottom: 10px; margin-bottom: 15px; display: block; }
        .issue-item { margin-bottom: 12px; padding: 10px; border-radius: 6px; background: #fff5f5; border-left: 4px solid #f44336; }
        .issue-title { font-weight: bold; color: #d32f2f; font-size: 13px; text-transform: uppercase; }
        .solution { color: #1b5e20; font-size: 14px; margin-top: 5px; font-style: italic; }
        .btn-back { display: block; width: 160px; margin: 20px auto 0; padding: 10px; background: #546e7a; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h2 id="factory-dash">ĐANG TẢI...</h2>
    <div id="chart-wrap"><canvas id="radarChart"></canvas></div>
    <div id="evaluation-box">
        <span class="eval-header">⚡ PHÂN TÍCH CHUYÊN SÂU & GIẢI PHÁP</span>
        <div id="evaluation-content">Đang phân tích dữ liệu...</div>
    </div>
    <a href="index.html" class="btn-back">QUAY LẠI KHẢO SÁT</a>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE", authDomain: "qldd-2025.firebaseapp.com", databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com", projectId: "qldd-2025", storageBucket: "qldd-2025.firebasestorage.app", messagingSenderId: "84684010166", appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17", measurementId: "G-7E5BDTCSEZ" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('active_session/name').on('value', snap => {
        document.getElementById('factory-dash').innerText = "DASHBOARD AN TOÀN - " + (snap.val() || "NHÀ MÁY").toUpperCase();
    });

    let myChart = null;
    const labels = ['Lãnh đạo', 'Báo cáo', 'Tuân thủ', 'Môi trường', 'Đào tạo'];
    const solutions = [
        "BGĐ cần thực hiện Safety Walk định kỳ và cam kết ưu tiên an toàn hơn sản lượng.",
        "Xây dựng chính sách 'Không đổ lỗi' để khuyến khích báo cáo Near-miss qua mã QR.",
        "Siết chặt quy trình LOTO hiện trường; tăng cường Site-check đột xuất giữa ca.",
        "Rà soát hệ thống bảo ôn và lọc bụi; cung cấp PPE chuyên dụng cho khu vực lò hơi.",
        "Số hóa bài giảng bằng video sự cố thực tế và ứng dụng Gamification vào huấn luyện."
    ];

    function renderChart(dataPoints) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (myChart) { myChart.data.datasets[0].data = dataPoints; myChart.update(); return; }
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{ label: 'Điểm trung bình', data: dataPoints, backgroundColor: 'rgba(1, 87, 155, 0.2)', borderColor: '#01579b', borderWidth: 3 }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 5, ticks: { display: false, stepSize: 1 } } } }
        });
    }

    db.ref('surveys').on('value', (snap) => {
        const data = snap.val();
        const content = document.getElementById('evaluation-content');
        if (!data) { content.innerText = "Chưa có dữ liệu."; renderChart([0,0,0,0,0]); return; }
        
        let sums = [0,0,0,0,0], count = 0;
        for (let k in data) {
            sums[0]+=data[k].q1; sums[1]+=data[k].q2; sums[2]+=data[k].q3; sums[3]+=data[k].q4; sums[4]+=data[k].q5;
            count++;
        }
        const avgs = sums.map(s => parseFloat((s/count).toFixed(1)));
        renderChart(avgs);

        let html = `<p style='font-size:14px;'>Tổng hợp <b>${count}</b> phiếu. Các trục cần cải thiện:</p>`;
        let hasIssue = false;
        avgs.forEach((val, i) => {
            if (val < 3.5) {
                hasIssue = true;
                html += `<div class="issue-item"><span class="issue-title">${labels[i]} (${val}/5)</span><p class="solution">🎯 Giải pháp: ${solutions[i]}</p></div>`;
            }
        });
        content.innerHTML = hasIssue ? html : "<p style='color:green; font-weight:bold;'>✅ Văn hóa an toàn đang ở mức tốt!</p>";
    });
</script>
</body>
</html>
